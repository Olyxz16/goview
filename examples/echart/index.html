<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stock monitor</title>
  <script src="webui.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f11;
      --surface:  #18181c;
      --border:   #2a2a32;
      --accent:   #7c6af7;
      --accent-h: #9d8fff;
      --text:     #e8e8f0;
      --muted:    #6b6b80;
      --up:       #4ade80;
      --down:     #f87171;
      --radius:   10px;
      --font:     'DM Mono', 'Fira Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      display: grid;
      grid-template-rows: auto auto 1fr;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
      gap: 16px;
    }

    header {
      padding: 32px 0 8px;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    header h1 span {
      color: var(--accent);
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 12px;
    }

    .controls input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .controls input:focus {
      border-color: var(--accent);
    }

    .btn {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      cursor: pointer;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      padding: 10px 18px;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:hover  { background: var(--accent-h); }
    .btn:active { transform: scale(0.97); }

    #ticker-info {
      min-height: 48px;
    }

    .ticker-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
    }

    .ticker-name {
      font-weight: 600;
      font-size: 16px;
    }

    .latest {
      margin-left: auto;
      font-size: 18px;
      font-weight: 600;
    }

    .change {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
    }

    .change.up   { color: var(--up); }
    .change.down { color: var(--down); }

    .empty {
      color: var(--muted);
      font-style: italic;
      padding: 12px 0;
    }

    #stock-chart {
      width: 100%;
      height: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
  </style>
</head>
<body>

<div class="app">
  <header>
    <h1>stock<span>monitor</span></h1>
    <div class="controls">
      <input id="ticker-input"
             type="text"
             placeholder="Ticker (e.g. AAPL)"
             value="DEMO"
             w-call="Refresh"
             w-trigger="keydown"
             w-key="Enter"
             w-value
             w-clear>
      <button class="btn"
              w-call="Refresh"
              w-value="#ticker-input"
              w-clear="#ticker-input">
        Refresh
      </button>
      <button class="btn"
              w-call="Randomize">
        Randomize
      </button>
    </div>
  </header>

  <div id="ticker-info"></div>

  <div id="stock-chart" data-option="{}"></div>
</div>

<script>
  let chart = null;

  function updateChart() {
    const el = document.getElementById('stock-chart');
    if (!el) return;
    const raw = el.getAttribute('data-option');
    if (!raw || raw === '{}') return;

    if (typeof echarts === 'undefined') {
      el.textContent = 'ECharts library failed to load. Check internet connectivity.';
      console.error('[echart] echarts is not defined — CDN script may have failed to load');
      return;
    }

    try {
      const option = JSON.parse(raw);
      console.log('[echart] data-option updated, series count:', option.series ? option.series.length : 0);
      if (!chart) {
        chart = echarts.init(el);
        console.log('[echart] chart initialized, size:', el.clientWidth, 'x', el.clientHeight);
        window.addEventListener('resize', () => chart && chart.resize());
      }
      chart.setOption(option, true);
      chart.resize();
      console.log('[echart] setOption + resize done');
    } catch (e) {
      console.error('[echart] failed to parse data-option:', e);
      el.textContent = 'Chart error: ' + e.message;
    }
  }

  const observer = new MutationObserver(updateChart);
  observer.observe(
    document.getElementById('stock-chart'),
    { attributes: true, attributeFilter: ['data-option'] }
  );
</script>

</body>
</html>
