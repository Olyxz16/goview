<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tasks</title>
  <script src="webui.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f11;
      --surface:  #18181c;
      --border:   #2a2a32;
      --accent:   #7c6af7;
      --accent-h: #9d8fff;
      --text:     #e8e8f0;
      --muted:    #6b6b80;
      --done:     #3a3a48;
      --danger:   #f76a6a;
      --radius:   10px;
      --font:     'DM Mono', 'Fira Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      max-width: 680px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Header ── */
    header {
      padding: 32px 0 20px;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    header h1 span {
      color: var(--accent);
    }

    /* ── Input row ── */
    .input-row {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .input-row input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .input-row input:focus {
      border-color: var(--accent);
    }

    .input-row input::placeholder {
      color: var(--muted);
    }

    .btn {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      cursor: pointer;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      padding: 10px 18px;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:hover  { background: var(--accent-h); }
    .btn:active { transform: scale(0.97); }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .btn-ghost:hover {
      background: var(--surface);
      border-color: var(--muted);
      color: var(--text);
    }

    /* ── Filter tabs ── */
    .filters {
      display: flex;
      gap: 4px;
      padding: 16px 0 0;
    }

    .filter-btn {
      background: none;
      border: none;
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      padding: 5px 12px;
      text-transform: uppercase;
      transition: color 0.15s, background 0.15s;
    }

    .filter-btn:hover    { color: var(--text); background: var(--surface); }
    .filter-btn.active   { color: var(--accent); background: var(--surface); }

    /* ── Task list ── */
    .main-area {
      overflow-y: auto;
      padding: 8px 0;
    }

    #task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .task-item {
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      gap: 12px;
      padding: 12px 14px;
      transition: border-color 0.15s, opacity 0.2s;
    }

    .task-item:hover { border-color: var(--muted); }

    .task-item.done {
      opacity: 0.5;
    }

    .task-item.done .task-title {
      text-decoration: line-through;
      color: var(--muted);
    }

    .toggle-btn {
      align-items: center;
      background: none;
      border: 2px solid var(--border);
      border-radius: 50%;
      color: var(--accent);
      cursor: pointer;
      display: flex;
      flex-shrink: 0;
      font-size: 11px;
      height: 22px;
      justify-content: center;
      transition: border-color 0.15s, background 0.15s;
      width: 22px;
    }

    .toggle-btn:hover         { border-color: var(--accent); }
    .done .toggle-btn         { background: var(--done); border-color: var(--done); }

    .task-title {
      flex: 1;
      line-height: 1.4;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      opacity: 0;
      padding: 0 2px;
      transition: color 0.15s, opacity 0.15s;
    }

    .task-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover             { color: var(--danger); }

    .empty-state {
      color: var(--muted);
      font-style: italic;
      padding: 32px 0;
      text-align: center;
    }

    /* ── Footer ── */
    footer {
      align-items: center;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      justify-content: space-between;
      padding: 14px 0 20px;
    }

    #task-count {
      color: var(--muted);
      font-size: 12px;
    }

    #status-bar {
      color: var(--danger);
      font-size: 12px;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar       { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<div class="app">

  <header>
    <h1>task<span>s</span></h1>

    <div class="input-row">
      <input id="new-task-input"
             type="text"
             placeholder="Add a new task…"
             w-call="AddTask"
             w-trigger="keydown"
             w-key="Enter"
             w-value
             w-clear>
      <button class="btn"
              w-call="AddTask"
              w-value="#new-task-input"
              w-clear="#new-task-input">
        Add
      </button>
    </div>

    <div id="filter-bar"></div>
  </header>

  <div class="main-area">
    <ul id="task-list"></ul>
  </div>

  <footer>
    <div id="task-count"></div>
    <div id="status-bar"></div>
    <button class="btn btn-ghost" w-call="ClearDone">Clear done</button>
  </footer>

</div>

</body>
</html>
